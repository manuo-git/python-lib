name: verify

on:
    push:
        branches:
            - main # ご自身のリポジトリのデフォルトブランチ名

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # 🌟 1. Python 3.11 環境を明示的に構築し、仮想環境(venv)を作成してパスを完全固定する
            - name: Set up Python 3.11 and Virtual Environment
              run: |
                  sudo apt-get update && sudo apt-get install -y python3.11 python3.11-venv
                  python3.11 -m venv venv
                  echo "$GITHUB_WORKSPACE/venv/bin" >> $GITHUB_PATH

            # 🌟 2. 作成した仮想環境内に、必要なツールをすべてインストール
            - name: Install dependencies
              run: |
                  pip install --upgrade pip
                  pip install setuptools
                  pip install online-judge-verify-helper
                  pip install online-judge-tools

            # 🌟 3. テスト（Verify）の実行
            - name: Run verification
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  oj-verify run

            # 🌟 4. ドキュメント生成とデプロイ
            - name: Generate and Deploy Document
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  oj-verify docs
