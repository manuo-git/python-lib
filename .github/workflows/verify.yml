name: verify

on:
    push:
        branches:
            - main # ご自身のリポジトリのデフォルトブランチ名

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # 1. 公式アクションで Python 3.11.x をインストール
            - name: Set up Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  update-environment-path: true

            # 🌟 2. 仮想環境(venv)をリポジトリの外（ユーザーディレクトリ直下）に作成してパスを通す
            - name: Create and Activate Virtual Environment
              run: |
                  python -m venv /home/runner/venv
                  echo "/home/runner/venv/bin" >> $GITHUB_PATH

            # 3. 仮想環境内に必要なツールをインストール
            - name: Install dependencies
              run: |
                  pip install --upgrade pip
                  pip install setuptools
                  pip install online-judge-verify-helper
                  pip install online-judge-tools

            # 4. テスト（Verify）の実行
            - name: Run verification
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  oj-verify run

            # 5. ドキュメント生成とデプロイ
            - name: Generate and Deploy Document
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  oj-verify docs
